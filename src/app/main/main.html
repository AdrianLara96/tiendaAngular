<!-- 
    ./src/app/main/main.html 
    Componente main (tienda) 
-->

 <div class="wrapper">
    <div class="panel">
        <app-listado-productos 
            [productos]="productos"
            (addToCart)="anadirAlCarrito($event)"
        ></app-listado-productos>
    </div>
    <div class="panel">
        <app-carrito-compra
            [carrito]="carrito"
            (removeFromCart)="eliminarDelCarrito($event)"
        ></app-carrito-compra>
    </div>
</div>
